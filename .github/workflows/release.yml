name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install
      - run: bun run --cwd packages/shared build
      - run: bun run --cwd backend build
      - run: bun run --cwd cli build

      - name: Build extension (Chrome)
        run: bun run --cwd extension build

      - name: Create extension zip
        run: |
          cd extension/.output/chrome-mv3
          zip -r ../../../bookmark-rebalancer-chrome.zip .

      - name: Build extension (Firefox)
        run: |
          cd extension
          npx wxt build --browser firefox
          cd .output/firefox-mv3
          zip -r ../../../bookmark-rebalancer-firefox.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            bookmark-rebalancer-chrome.zip
            bookmark-rebalancer-firefox.zip
