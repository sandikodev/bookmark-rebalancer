<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookmark Rebalancer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
      min-width: 300px;
    }
    h1 {
      font-size: 18px;
      color: #00d4ff;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h2 {
      font-size: 14px;
      color: #a0a0b0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      margin-top: 20px;
    }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }
    .stat-card {
      background: #16213e;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }
    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #00d4ff;
    }
    .stat-label {
      font-size: 11px;
      color: #707080;
      margin-top: 4px;
    }
    .card {
      background: #16213e;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .card-title {
      font-weight: 600;
      font-size: 14px;
    }
    .badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      background: #0f3460;
      color: #00d4ff;
    }
    .badge.active { background: #1a3a2e; color: #4ade80; }
    .badge.paused { background: #3a3a1a; color: #facc15; }
    .badge.completed { background: #2a2a3a; color: #a0a0b0; }
    .badge.priority { background: #3a1a1a; color: #f87171; }
    .progress-bar {
      height: 4px;
      background: #2a2a4a;
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: #00d4ff;
      border-radius: 2px;
      transition: width 0.3s;
    }
    .schedule-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #2a2a4a;
    }
    .schedule-item:last-child { border-bottom: none; }
    .schedule-time {
      font-size: 12px;
      color: #707080;
    }
    .schedule-project {
      font-size: 13px;
      flex: 1;
      margin: 0 12px;
    }
    .schedule-done {
      width: 18px;
      height: 18px;
      border: 2px solid #2a2a4a;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
    }
    .schedule-done.done {
      background: #4ade80;
      border-color: #4ade80;
      color: #1a1a2e;
    }
    .empty {
      color: #707080;
      font-size: 13px;
      text-align: center;
      padding: 20px;
      font-style: italic;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: #707080;
    }
    .refresh-btn {
      background: none;
      border: 1px solid #2a2a4a;
      color: #a0a0b0;
      padding: 4px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      margin-left: auto;
    }
    .refresh-btn:hover { background: #2a2a4a; }
    .error {
      background: #3a1a1a;
      color: #f87171;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>
    🔖 Bookmark Rebalancer
    <button class="refresh-btn" id="refresh-btn">↻ Refresh</button>
  </h1>

  <div id="content">
    <div class="loading">Loading...</div>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
