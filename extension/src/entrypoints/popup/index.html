<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookmark Rebalancer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      width: 400px;
      min-height: 300px;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
    }
    h1 {
      font-size: 18px;
      margin-bottom: 16px;
      color: #00d4ff;
    }
    .field {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 12px;
      color: #a0a0b0;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input, textarea, select {
      width: 100%;
      padding: 8px 10px;
      background: #16213e;
      border: 1px solid #2a2a4a;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, textarea:focus {
      border-color: #00d4ff;
    }
    textarea {
      resize: vertical;
      min-height: 60px;
      font-family: inherit;
    }
    .tags-input {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding: 4px;
      background: #16213e;
      border: 1px solid #2a2a4a;
      border-radius: 6px;
      min-height: 36px;
      cursor: text;
    }
    .tag {
      background: #0f3460;
      color: #00d4ff;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .tag-remove {
      cursor: pointer;
      opacity: 0.6;
      font-size: 14px;
    }
    .tag-remove:hover { opacity: 1; }
    .tags-input input {
      border: none;
      background: transparent;
      padding: 4px;
      flex: 1;
      min-width: 60px;
      color: #e0e0e0;
    }
    .tags-input input:focus { border: none; outline: none; }
    button {
      width: 100%;
      padding: 10px;
      background: #00d4ff;
      color: #1a1a2e;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #00b8e6; }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .status {
      margin-top: 12px;
      padding: 8px;
      border-radius: 6px;
      font-size: 13px;
      display: none;
    }
    .status.success {
      display: block;
      background: #1a3a2e;
      color: #4ade80;
      border: 1px solid #2a5a3e;
    }
    .status.error {
      display: block;
      background: #3a1a1a;
      color: #f87171;
      border: 1px solid #5a2a2a;
    }
    .platform-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .platform-badge.github { background: #2d333b; color: #c9d1d9; }
    .platform-badge.huggingface { background: #1a2a1a; color: #ffd21e; }
    .platform-badge.arxiv { background: #2a1a2a; color: #b980e0; }
    .platform-badge.other { background: #2a2a3a; color: #a0a0b0; }
    .preview {
      background: #16213e;
      border: 1px solid #2a2a4a;
      border-radius: 6px;
      padding: 10px;
      margin-bottom: 12px;
    }
    .preview-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .preview-url {
      font-size: 11px;
      color: #707080;
      word-break: break-all;
    }
    .preview-summary {
      font-size: 12px;
      color: #a0a0c0;
      margin-top: 6px;
      line-height: 1.4;
    }
    .btn-secondary {
      background: #2a2a4a;
      color: #a0a0c0;
      margin-top: 8px;
    }
    .btn-secondary:hover { background: #3a3a5a; }
    .btn-group { display: flex; gap: 8px; }
    .btn-group button { flex: 1; }
    .loading {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #2a2a4a;
      border-top-color: #00d4ff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <h1>🔖 Bookmark Rebalancer</h1>
  <div id="platform-badge" class="platform-badge other">Other</div>
  <div class="preview">
    <div class="preview-title" id="preview-title">Loading...</div>
    <div class="preview-url" id="preview-url"></div>
  </div>
  <div class="field">
    <label>Title</label>
    <input type="text" id="title" placeholder="Bookmark title" />
  </div>
  <div class="field">
    <label>Notes</label>
    <textarea id="notes" placeholder="Add notes..."></textarea>
  </div>
  <div class="field">
    <label>Tags</label>
    <div class="tags-input" id="tags-container">
      <input type="text" id="tag-input" placeholder="Type and press Enter..." />
    </div>
  </div>
  <div class="field">
    <label>Collection (optional)</label>
    <select id="collection">
      <option value="">None</option>
    </select>
  </div>
  <div class="btn-group">
    <button id="save-btn">Save Bookmark</button>
    <button id="smart-btn" class="btn-secondary">✨ Smart Save</button>
  </div>
  <div id="status" class="status"></div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
